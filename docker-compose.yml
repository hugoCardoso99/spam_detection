services:
  postgres:
    image: postgres:15
    container_name: spam_detection_db
    environment:
      POSTGRES_USER: spam_user
      POSTGRES_PASSWORD: spam_password
      POSTGRES_DB: spam_detection
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U spam_user -d spam_detection"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
